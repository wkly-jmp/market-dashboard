name: Update market data

on:
  workflow_dispatch:
  schedule:
    # JST 08:30, Monday-Friday. Intended to run after US market close and FRED updates.
    - cron: "30 23 * * 0-4"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -s requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Fetch FRED market data
        run: python scripts/fetch_market_data.py

      - name: Commit updated data
        run: |
          if [ -z "$(git status --porcelain -- data/latest.json data/history.json)" ]; then
            echo "No market data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          if [ -f data/history.json ]; then
            git add data/history.json
          fi
          git commit -m "Update market data"
          git push
