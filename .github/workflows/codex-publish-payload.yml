name: Codex publish payload

on:
  workflow_dispatch:
  push:
    paths:
      - ".codex-publish/payload/**"
      - ".github/workflows/codex-publish-payload.yml"

permissions:
  contents: write

concurrency:
  group: codex-publish-payload
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check payload manifest
        id: manifest
        run: |
          if [ -f .codex-publish/payload/manifest.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No payload manifest; nothing to apply."
          fi

      - name: Apply payload
        if: steps.manifest.outputs.exists == 'true'
        run: |
          python - <<'PY'
          import base64
          import hashlib
          import json
          import shutil
          import zipfile
          from pathlib import Path

          repo = Path.cwd()
          payload_dir = repo / ".codex-publish" / "payload"
          manifest = json.loads((payload_dir / "manifest.json").read_text(encoding="utf-8"))
          chunk_count = int(manifest["chunk_count"])
          chunks = []
          missing = []
          for index in range(1, chunk_count + 1):
              path = payload_dir / f"chunk-{index:03d}.b64"
              if not path.exists():
                  missing.append(str(path))
              else:
                  chunks.append(path.read_text(encoding="ascii").strip())
          if missing:
              raise SystemExit("Missing payload chunks: " + ", ".join(missing))

          data = base64.b64decode("".join(chunks), validate=True)
          actual_sha = hashlib.sha256(data).hexdigest()
          expected_sha = manifest["zip_sha256"]
          if actual_sha != expected_sha:
              raise SystemExit(f"Payload SHA mismatch: {actual_sha} != {expected_sha}")

          zip_path = payload_dir / "payload.zip"
          zip_path.write_bytes(data)
          extract_dir = payload_dir / "extract"
          if extract_dir.exists():
              shutil.rmtree(extract_dir)
          extract_dir.mkdir(parents=True)
          root = extract_dir.resolve()
          with zipfile.ZipFile(zip_path) as archive:
              for member in archive.infolist():
                  target = (extract_dir / member.filename).resolve()
                  if not str(target).startswith(str(root)):
                      raise SystemExit(f"Unsafe archive path: {member.filename}")
                  archive.extract(member, extract_dir)

          files = manifest["files"]
          for rel in files:
              src = extract_dir / rel
              dst = repo / rel
              if not src.is_file():
                  raise SystemExit(f"Payload file missing after extract: {rel}")
              dst.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(src, dst)
          print(f"Applied {len(files)} files from payload {expected_sha}.")
          PY

      - name: Validate
        if: steps.manifest.outputs.exists == 'true'
        env:
          PYTHONPATH: .
        run: |
          node --check src/app.js
          node --check src/guardrails.js
          node --check src/scoring.js
          node --check scripts/apply_guardrails.mjs
          python -m py_compile scripts/fetch_market_data.py
          node tests/guardrails.test.mjs
          node tests/scoring-regimes.test.mjs
          python tests/guardrails_python_test.py

      - name: Commit applied payload
        if: steps.manifest.outputs.exists == 'true'
        run: |
          python - <<'PY' > /tmp/codex_payload_files.txt
          import json
          from pathlib import Path
          manifest = json.loads(Path('.codex-publish/payload/manifest.json').read_text(encoding='utf-8'))
          for path in manifest['files']:
              print(path)
          PY
          git config user.name "codex-publish[bot]"
          git config user.email "codex-publish[bot]@users.noreply.github.com"
          xargs git add -- < /tmp/codex_payload_files.txt
          git rm -r --ignore-unmatch .codex-publish/payload
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Improve short-term market thermometer guardrails"
          git push
